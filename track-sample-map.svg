<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161718"/>
      <stop offset="100%" stop-color="#0e0f0f"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
    <marker id="routeDot" markerWidth="10" markerHeight="10" refX="5" refY="5">
      <circle cx="5" cy="5" r="5" fill="#F59E0B"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="600" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="600" fill="url(#grid)"/>

  <!-- Route -->
  <path d="M 180 410 C 320 330, 420 360, 520 280
           S 740 200, 840 250
           S 980 330, 1030 220"
        fill="none" stroke="#F59E0B" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <path d="M 180 410 C 320 330, 420 360, 520 280
           S 740 200, 840 250
           S 980 330, 1030 220"
        fill="none" stroke="rgba(0,212,200,0.35)" stroke-width="14" stroke-linecap="round" opacity="0.25"/>

  <!-- Start/End markers -->
  <circle cx="180" cy="410" r="18" fill="rgba(34,197,94,0.15)" stroke="#22C55E" stroke-width="3"/>
  <circle cx="1030" cy="220" r="18" fill="rgba(0,212,200,0.15)" stroke="#00D4C8" stroke-width="3"/>

  <!-- Vehicle marker -->
  <circle cx="740" cy="200" r="12" fill="#00D4C8" stroke="#ffffff" stroke-width="3"/>
  <text x="740" y="175" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="16" fill="#F0EDE8" font-weight="700">TRUCK</text>

  <!-- Labels -->
  <text x="140" y="455" font-family="Space Mono, monospace" font-size="18" fill="#9CA3AF">Pickup</text>
  <text x="990" y="255" font-family="Space Mono, monospace" font-size="18" fill="#9CA3AF">Destination</text>
  <text x="600" y="70" text-anchor="middle" font-family="DM Sans, Arial, sans-serif" font-size="28" fill="#F59E0B" font-weight="800">Sample Tracking Map</text>
</svg>
