<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="g0" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#232527"/>
      <stop offset="55%" stop-color="#161718"/>
      <stop offset="100%" stop-color="#0e0f0f"/>
    </linearGradient>
    <radialGradient id="r1" cx="25%" cy="20%" r="55%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#00D4C8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0e0f0f" stop-opacity="0"/>
