    <radialGradient id="r2" cx="80%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#00D4C8" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#22C55E" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0e0f0f" stop-opacity="0"/>
